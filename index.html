<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Documentaries</title>
	<link rel="stylesheet" href="indexFBI.css">
</head>
<body>
	<header>
		<h1>Most Wanted Documentaries</h1>
	</header>
	<main id="wanted-list-container">
		<section id="documentary-section" style="margin-top:40px;">
			<div style="margin-bottom: 18px; display: flex; align-items: center; gap: 12px;">
				<label for="doc-sort-select" style="font-weight:bold;">Sort by:</label>
				<select id="doc-sort-select" style="padding:8px;font-size:1rem;">
				  <option value="title-asc">Title (A-Z)</option>
				  <option value="title-desc">Title (Z-A)</option>
				  <option value="year-desc">Year (Newest)</option>
				  <option value="year-asc">Year (Oldest)</option>
				</select>
			</div>
			<div id="omdb-docs-container" style="display: flex; flex-wrap: wrap; gap: 16px; align-items: stretch;">
				<p>Loading documentaries...</p>
			</div>
		</section>
	</main>
	<footer>
		<p>&copy; 2023 FBI Most Wanted App</p>
	</footer>
	<script src="indexFBI.js"></script>
</body>
</html>
